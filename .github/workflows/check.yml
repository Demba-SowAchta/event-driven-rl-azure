name: CI Check
on:
  push:
    branches: [main]

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -f README.md && echo "README OK"
          test -d api && echo "api OK"
          test -d functions && echo "functions OK"
          test -d model && echo "model OK"
          test -d web && echo "web OK"
          echo "All structure checks passed"
