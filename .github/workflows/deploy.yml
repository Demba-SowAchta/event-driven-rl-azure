name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, prod]

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login -n ${{ vars.ACR_NAME }}

      - name: Build & push RL image
        run: |
          docker build -t ${{ vars.ACR_NAME }}.azurecr.io/rl-api:$IMAGE_TAG \
                       -t ${{ vars.ACR_NAME }}.azurecr.io/rl-api:latest ./api
          docker push ${{ vars.ACR_NAME }}.azurecr.io/rl-api:$IMAGE_TAG
          docker push ${{ vars.ACR_NAME }}.azurecr.io/rl-api:latest

      - name: Update Container Apps
        run: az containerapp update -n ${{ vars.CONTAINER_APP }} -g ${{ vars.RG }} \
              --image ${{ vars.ACR_NAME }}.azurecr.io/rl-api:$IMAGE_TAG

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy Functions
        working-directory: ./functions
        run: func azure functionapp publish ${{ vars.FUNC_APP }} --python

      - name: Smoke test
        run: |
          URL=https://$(az containerapp show -n ${{ vars.CONTAINER_APP }} \
              -g ${{ vars.RG }} --query properties.configuration.ingress.fqdn -o tsv)
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL/health)
            [ "$STATUS" = "200" ] && echo "API healthy" && exit 0
            sleep 5
          done
          exit 1

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Promote staging -> prod
        run: az acr import -n ${{ vars.ACR_NAME_PROD }} \
              --source ${{ vars.ACR_NAME }}.azurecr.io/rl-api:$IMAGE_TAG \
              --image rl-api:$IMAGE_TAG --force
      - name: Update prod Container Apps
        run: az containerapp update -n ${{ vars.CONTAINER_APP_PROD }} \
              -g ${{ vars.RG_PROD }} \
              --image ${{ vars.ACR_NAME_PROD }}.azurecr.io/rl-api:$IMAGE_TAG
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm i -g azure-functions-core-tools@4 --unsafe-perm true
      - name: Deploy Functions to prod
        working-directory: ./functions
        run: func azure functionapp publish ${{ vars.FUNC_APP_PROD }} --python
