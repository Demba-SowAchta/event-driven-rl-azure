name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx

      - name: Install API deps (slim, no torch)
        run: pip install -r api/requirements.txt

      - name: Ruff lint
        run: ruff check api/ functions/ model/

      - name: Generate stub agent for tests
        run: |
          mkdir -p api/artifacts
          python - << 'PYEOF'
          import sys, joblib
          sys.path.insert(0, "api")
          from app.rl_service import StubAgent
          joblib.dump(StubAgent(), "api/artifacts/ppo_v1.0.0.pkl")
          PYEOF

      - name: Run pytest
        working-directory: ./api
        env:
          MODEL_PATH: ${{ github.workspace }}/api/artifacts/ppo_v1.0.0.pkl
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Stub agent placeholder
        run: |
          mkdir -p api/artifacts
          touch api/artifacts/ppo_v1.0.0.pkl
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (cache GHA)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true
          tags: rl-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rl-api:ci
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  swa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -f web/index.html && test -f web/app.js && test -f web/style.css
          echo "Static Web App assets present"
