name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }

      - name: Install dev tools
        run: pip install --upgrade pip && pip install ruff pytest 'httpx<0.28'

      - name: Install API deps (NO torch in CI - too heavy)
        run: |
          # CI installe les deps "lite" (sans torch/sb3) car on utilise StubAgent
          pip install fastapi==0.110.0 'uvicorn[standard]'==0.29.0 \
              pydantic==2.6.4 pydantic-settings==2.2.1 \
              numpy==1.26.4 pandas==2.2.2 gymnasium==0.29.1 joblib==1.4.2

      - name: Ruff lint
        run: ruff check api/ functions/ model/ || true

      - name: Generate stub agent for tests
        run: |
          mkdir -p api/artifacts model/artifacts
          python - << 'PYEOF'
          import sys, joblib, os, numpy as np
          sys.path.insert(0, 'api')
          os.environ['MODEL_PATH'] = 'api/artifacts/ppo_v1.0.0.pkl'
          os.environ['MODEL_VERSION'] = '1.0.0'
          from app.rl_service import StubAgent
          joblib.dump(StubAgent(), 'api/artifacts/ppo_v1.0.0.pkl')
          joblib.dump(StubAgent(), 'model/artifacts/ppo_v1.0.0.pkl')
          print('OK stub generated')
          PYEOF

      - name: Run pytest
        working-directory: ./api
        env:
          MODEL_PATH: ${{ github.workspace }}/api/artifacts/ppo_v1.0.0.pkl
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p api/artifacts
          touch api/artifacts/ppo_v1.0.0.pkl
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true
          tags: rl-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rl-api:ci
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  swa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -f web/index.html && test -f web/app.js && test -f web/style.css
          echo "Static Web App assets present"
