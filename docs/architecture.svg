<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 9 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 9 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="760" fill="#f8fafc"/>

  <!-- title block -->
  <text x="60" y="58" fill="#0f172a" font-size="26" font-weight="700">Tradeon</text>
  <text x="60" y="80" fill="#475569" font-size="13">Event-driven RL trading pipeline on Azure</text>
  <text x="1140" y="58" text-anchor="end" fill="#94a3b8" font-size="11">ECE Paris &mdash; Distributed Systems &amp; AI</text>
  <text x="1140" y="74" text-anchor="end" fill="#94a3b8" font-size="11">Demba Sow Achta &middot; 2026</text>

  <line x1="60" y1="98" x2="1140" y2="98" stroke="#e2e8f0" stroke-width="1"/>

  <!-- =====================================================================
       Row 1: ingestion + dispatch
       ===================================================================== -->

  <!-- User upload -->
  <g filter="url(#soft)">
    <rect x="60" y="130" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="78" y="156" fill="#0f172a" font-size="13" font-weight="600">User uploads CSV</text>
    <text x="78" y="176" fill="#64748b" font-size="11">SPY_2024.csv (OHLCV)</text>
    <text x="78" y="194" fill="#64748b" font-size="11">via Azure Portal or az CLI</text>
  </g>

  <!-- Blob input -->
  <g filter="url(#soft)">
    <rect x="280" y="130" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="280" y="130" width="170" height="22" rx="8" fill="#fde68a"/>
    <rect x="280" y="144" width="170" height="8" fill="#fde68a"/>
    <text x="294" y="146" fill="#78350f" font-size="11" font-weight="600">Blob Storage</text>
    <text x="294" y="178" fill="#0f172a" font-size="12" font-weight="600">container: input</text>
    <text x="294" y="196" fill="#64748b" font-size="11">Standard LRS</text>
  </g>

  <!-- Event Grid -->
  <g filter="url(#soft)">
    <rect x="500" y="130" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="500" y="130" width="170" height="22" rx="8" fill="#fed7aa"/>
    <rect x="500" y="144" width="170" height="8" fill="#fed7aa"/>
    <text x="514" y="146" fill="#7c2d12" font-size="11" font-weight="600">Event Grid</text>
    <text x="514" y="178" fill="#0f172a" font-size="12" font-weight="600">BlobCreated event</text>
    <text x="514" y="196" fill="#64748b" font-size="11">push to subscribers</text>
  </g>

  <!-- Dispatcher -->
  <g filter="url(#soft)">
    <rect x="720" y="130" width="180" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="720" y="130" width="180" height="22" rx="8" fill="#bae6fd"/>
    <rect x="720" y="144" width="180" height="8" fill="#bae6fd"/>
    <text x="734" y="146" fill="#075985" font-size="11" font-weight="600">Function: dispatcher</text>
    <text x="734" y="178" fill="#0f172a" font-size="12" font-weight="600">validate CSV</text>
    <text x="734" y="196" fill="#64748b" font-size="11">enqueue or reject</text>
  </g>

  <!-- Queue -->
  <g filter="url(#soft)">
    <rect x="950" y="130" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="950" y="130" width="170" height="22" rx="8" fill="#fde68a"/>
    <rect x="950" y="144" width="170" height="8" fill="#fde68a"/>
    <text x="964" y="146" fill="#78350f" font-size="11" font-weight="600">Storage Queue</text>
    <text x="964" y="178" fill="#0f172a" font-size="12" font-weight="600">rl-jobs</text>
    <text x="964" y="196" fill="#64748b" font-size="11">+ rl-jobs-poison (DLQ)</text>
  </g>

  <!-- arrows row 1 -->
  <path d="M 230 172 L 280 172" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="255" y="166" text-anchor="middle" fill="#64748b" font-size="10">upload</text>

  <path d="M 450 172 L 500 172" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="475" y="166" text-anchor="middle" fill="#64748b" font-size="10">trigger</text>

  <path d="M 670 172 L 720 172" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="695" y="166" text-anchor="middle" fill="#64748b" font-size="10">webhook</text>

  <path d="M 900 172 L 950 172" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="925" y="166" text-anchor="middle" fill="#64748b" font-size="10">if valid</text>

  <!-- reject branch -->
  <g filter="url(#soft)">
    <rect x="720" y="240" width="180" height="60" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="734" y="262" fill="#991b1b" font-size="11" font-weight="600">container: rejected</text>
    <text x="734" y="282" fill="#7f1d1d" font-size="11">bad schema or extension</text>
  </g>
  <path d="M 810 214 L 810 240" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text x="816" y="232" fill="#991b1b" font-size="10">if invalid</text>

  <!-- =====================================================================
       Row 2: processing
       ===================================================================== -->

  <!-- Worker -->
  <g filter="url(#soft)">
    <rect x="950" y="360" width="170" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="950" y="360" width="170" height="22" rx="8" fill="#bae6fd"/>
    <rect x="950" y="374" width="170" height="8" fill="#bae6fd"/>
    <text x="964" y="376" fill="#075985" font-size="11" font-weight="600">Function: worker</text>
    <text x="964" y="408" fill="#0f172a" font-size="12" font-weight="600">queue-triggered</text>
    <text x="964" y="426" fill="#64748b" font-size="11">download CSV</text>
    <text x="964" y="442" fill="#64748b" font-size="11">call /predict</text>
    <text x="964" y="458" fill="#64748b" font-size="11">save result + episode</text>
  </g>
  <path d="M 1035 214 L 1035 360" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="1043" y="290" fill="#64748b" font-size="10">dequeue</text>

  <!-- RL API -->
  <g filter="url(#soft)">
    <rect x="500" y="360" width="350" height="160" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="500" y="360" width="350" height="22" rx="8" fill="#bbf7d0"/>
    <rect x="500" y="374" width="350" height="8" fill="#bbf7d0"/>
    <text x="514" y="376" fill="#14532d" font-size="11" font-weight="600">Azure Container Apps &middot; rl-api</text>

    <text x="514" y="406" fill="#0f172a" font-size="13" font-weight="600">FastAPI service</text>
    <text x="514" y="426" fill="#475569" font-size="11">GET /health</text>
    <text x="514" y="442" fill="#475569" font-size="11">GET /version</text>
    <text x="514" y="458" fill="#475569" font-size="11">POST /predict (rollout PPO)</text>
    <text x="514" y="474" fill="#475569" font-size="11">GET /metrics</text>

    <rect x="690" y="395" width="148" height="110" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="700" y="414" fill="#14532d" font-size="11" font-weight="600">PPO agent</text>
    <text x="700" y="432" fill="#166534" font-size="10">stable-baselines3</text>
    <text x="700" y="448" fill="#166534" font-size="10">17-dim observation</text>
    <text x="700" y="464" fill="#166534" font-size="10">3 discrete actions</text>
    <text x="700" y="480" fill="#166534" font-size="10">TradingEnv (gym)</text>
    <text x="700" y="496" fill="#166534" font-size="10">~3MB pickle</text>

    <text x="514" y="500" fill="#94a3b8" font-size="10">scale 0 to 3 replicas &middot; consumption plan</text>
  </g>

  <!-- arrows worker <-> api -->
  <path d="M 950 410 L 850 410" stroke="#0ea5e9" stroke-width="1.5" fill="none" marker-end="url(#arrAccent)"/>
  <text x="900" y="404" text-anchor="middle" fill="#0369a1" font-size="10">POST /predict</text>
  <path d="M 850 432 L 950 432" stroke="#0ea5e9" stroke-width="1.5" fill="none" marker-end="url(#arrAccent)"/>
  <text x="900" y="448" text-anchor="middle" fill="#0369a1" font-size="10">JSON result</text>

  <!-- ACR -->
  <g filter="url(#soft)">
    <rect x="280" y="360" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="280" y="360" width="170" height="22" rx="8" fill="#e9d5ff"/>
    <rect x="280" y="374" width="170" height="8" fill="#e9d5ff"/>
    <text x="294" y="376" fill="#581c87" font-size="11" font-weight="600">Container Registry</text>
    <text x="294" y="408" fill="#0f172a" font-size="12" font-weight="600">rl-api:&lt;sha&gt;</text>
    <text x="294" y="426" fill="#64748b" font-size="11">Basic SKU</text>
  </g>
  <path d="M 450 402 L 500 402" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="3 3"/>
  <text x="475" y="396" text-anchor="middle" fill="#64748b" font-size="10">pull</text>

  <!-- =====================================================================
       Row 3: persistence + dashboard
       ===================================================================== -->

  <!-- container output -->
  <g filter="url(#soft)">
    <rect x="600" y="600" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="600" y="600" width="170" height="22" rx="8" fill="#fde68a"/>
    <rect x="600" y="614" width="170" height="8" fill="#fde68a"/>
    <text x="614" y="616" fill="#78350f" font-size="11" font-weight="600">Blob: output</text>
    <text x="614" y="648" fill="#0f172a" font-size="12" font-weight="600">_result.json</text>
    <text x="614" y="666" fill="#64748b" font-size="11">full episode replay</text>
  </g>

  <!-- Cosmos -->
  <g filter="url(#soft)">
    <rect x="820" y="600" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="820" y="600" width="170" height="22" rx="8" fill="#e9d5ff"/>
    <rect x="820" y="614" width="170" height="8" fill="#e9d5ff"/>
    <text x="834" y="616" fill="#581c87" font-size="11" font-weight="600">Cosmos DB (free tier)</text>
    <text x="834" y="648" fill="#0f172a" font-size="12" font-weight="600">rlpipeline.episodes</text>
    <text x="834" y="666" fill="#64748b" font-size="11">PK /agent_version</text>
  </g>

  <!-- HTTP API (dashboard backend) -->
  <g filter="url(#soft)">
    <rect x="280" y="600" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="280" y="600" width="170" height="22" rx="8" fill="#bae6fd"/>
    <rect x="280" y="614" width="170" height="8" fill="#bae6fd"/>
    <text x="294" y="616" fill="#075985" font-size="11" font-weight="600">Function: http_api</text>
    <text x="294" y="648" fill="#0f172a" font-size="12" font-weight="600">GET /api/recent</text>
    <text x="294" y="666" fill="#64748b" font-size="11">rate-limited 60/min/IP</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#soft)">
    <rect x="60" y="600" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="78" y="624" fill="#0f172a" font-size="13" font-weight="600">Static Web App</text>
    <text x="78" y="648" fill="#475569" font-size="11">vanilla JS dashboard</text>
    <text x="78" y="666" fill="#475569" font-size="11">Chart.js equity curves</text>
  </g>

  <!-- arrows persistence -->
  <path d="M 1010 460 L 880 600" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="970" y="540" fill="#64748b" font-size="10">upsert episode</text>

  <path d="M 985 460 L 685 600" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="780" y="540" text-anchor="middle" fill="#64748b" font-size="10">save JSON</text>

  <path d="M 820 642 L 450 642" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="635" y="635" text-anchor="middle" fill="#64748b" font-size="10">query top 20</text>

  <path d="M 280 642 L 230 642" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="255" y="635" text-anchor="middle" fill="#64748b" font-size="10">fetch</text>

  <!-- =====================================================================
       Sidebar: observability + cicd
       ===================================================================== -->
  <g filter="url(#soft)">
    <rect x="60" y="360" width="170" height="84" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="78" y="384" fill="#0f172a" font-size="13" font-weight="600">App Insights</text>
    <text x="78" y="404" fill="#475569" font-size="11">custom metrics: episode_</text>
    <text x="78" y="420" fill="#475569" font-size="11">reward, sharpe, latency</text>
    <text x="78" y="436" fill="#475569" font-size="11">KQL dashboards</text>
  </g>

  <g filter="url(#soft)">
    <rect x="60" y="460" width="170" height="68" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="78" y="484" fill="#0f172a" font-size="13" font-weight="600">GitHub Actions</text>
    <text x="78" y="504" fill="#475569" font-size="11">OIDC federated login</text>
    <text x="78" y="520" fill="#475569" font-size="11">ci.yml + deploy.yml</text>
  </g>

  <!-- dotted lines for telemetry -->
  <path d="M 500 470 Q 350 470 230 425" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
  <path d="M 720 215 Q 400 280 230 410" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
  <text x="265" y="475" fill="#94a3b8" font-size="10" font-style="italic">telemetry</text>

  <path d="M 230 494 L 380 460 L 280 402" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
  <text x="245" y="478" fill="#94a3b8" font-size="9" font-style="italic" transform="translate(15)">push</text>

  <!-- legend / footer -->
  <line x1="60" y1="710" x2="1140" y2="710" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="730" fill="#64748b" font-size="10">
    <tspan fill="#0f172a" font-weight="600">9 Azure resources</tspan>
    &middot; Container Apps, Functions, Event Grid, Storage (blob+queue), Cosmos DB, ACR, Log Analytics, App Insights, Container Apps Env
  </text>
  <text x="60" y="746" fill="#94a3b8" font-size="10">
    Region: France Central &middot; Free tier where available &middot; Total monthly cost observed: under $4 with daily idle hours
  </text>
</svg>
